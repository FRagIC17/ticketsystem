<section class="dashboard-layout fixed-grid has-5-cols">
	<div class="grid is-gap-0">
		<aside class="cell is-col-span-1 dashboard-sidebar">
			<app-navbar></app-navbar>
		</aside>

		<main class="cell is-col-span-4 dashboard-main">
			<div class="content">
				<h1 class="title is-3 pt-4">Dashboard</h1>
				<p class="subtitle is-6">Select an action from the left navigation.</p>
			</div>

			<div class="column">
				<div class="form-box">
					<p>Latest Tickets:</p>
				</div>
			</div>
			<div class="column is-half">
				<div class="form-box amount-of-tickets">
					<p>Amount of Tickets: {{ amountOfTickets }}</p>
				</div>
			</div>
		</main>
	</div>
</section>
