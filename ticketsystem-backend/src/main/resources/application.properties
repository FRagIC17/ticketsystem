# CORS policies for development environment
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:4200
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.exposed-headers=authorization,content-type

#development profile for database connection
%dev.quarkus.datasource.username=root

%dev.quarkus.datasource.password=AdminPassword!

%dev.quarkus.datasource.jdbc.url=jdbc:mysql://localhost:3306/ticketsystem_db